name: Auto Merge Pull Requests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Wait for PR to be mergeable
        id: wait_for_mergeable
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const maxRetries = 5;
            const delay = ms => new Promise(res => setTimeout(res, ms));

            let attempt = 0;
            let mergeable = null;

            while (attempt < maxRetries) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              mergeable = pr.mergeable;

              if (mergeable !== null) {
                core.info(`Mergeable state: ${mergeable}`);
                break;
              }

              core.info(`Attempt ${attempt + 1}: mergeable is null. Waiting...`);
              await delay(5000); // wait 5 seconds
              attempt++;
            }

            if (mergeable !== true) {
              core.setFailed(`PR #${prNumber} is not mergeable after ${maxRetries} retries.`);
            }

            core.setOutput("pr_number", prNumber);

      - name: Merge PR
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.wait_for_mergeable.outputs.pr_number }} --merge --admin --repo ${{ github.repository }}
